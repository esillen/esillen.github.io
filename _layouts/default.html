<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | capitalize }}</title>
    <script src="{{ site.baseurl }}/assets/js/jquery-1.4.2.min.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css">

    <!-- Fancybox -->
    <script type="text/javascript" src="{{site.baseurl}}/assets/fancybox/jquery.fancybox-1.3.4.pack.js"></script>
    <script type="text/javascript" src="{{site.baseurl}}/assets/js/fancy_images.js"></script>
    <link rel="stylesheet" href="{{site.baseurl}}/assets/fancybox/jquery.fancybox-1.3.4.css" type="text/css" media="screen" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23043816'/%3E%3Cstop offset='100%25' stop-color='%2309b33a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,Times New Roman,serif' font-size='44' font-style='italic' font-weight='700' fill='white'%3Ee%3C/text%3E%3C/svg%3E">
    {% if layout.styles %}
      {% for stylesheet in layout.styles %}
      <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/{{ stylesheet }}.css">
      {% endfor %}
    {% endif %}
    {% if page.styles %}
      {% for stylesheet in page.styles %}
      <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/{{ stylesheet }}.css">
      {% endfor %}
    {% endif %}
  </head>
  <body>
    <div class="main-container">
      <div class="header">
        {% include navigation.html %}
      </div>
      <div class="main">
        {{ content }}
      </div>
      <div class="footer">
        {% include footer.html%}
      </div>
    </div>
  </body>
</html>

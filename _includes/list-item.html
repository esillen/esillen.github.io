
{% if include.highlight %}
<li class="highlight">
  <div class="list-item-highlight">
    {% if include.mishmash %}
      <div class="list-item-image-mishmash-highlight" aria-label="{{include.image_alt}}"></div>
    {% else %}
      <img src="{{include.image_src}}" alt="{{include.image_alt}}" class="list-item-image-highlight"/>
    {% endif %}
{% else %}
<li>
  <div class="list-item">
    {% if include.mishmash %}
      <div class="list-item-image-mishmash" aria-label="{{include.image_alt}}"></div>
    {% else %}
      <img src="{{include.image_src}}" alt="{{include.image_alt}}" class="list-item-image"/>
    {% endif %}
{% endif %}
    <div class="list-item-text-container{% if include.highlight %} highlight{% endif %}">
      <h2>
        {{include.title}}
      </h2>
      <h3>
        {{include.year}} {{include.tjena}}

      </h3>
      <p>
        {{include.description}}
      </p>
    </div>
  </div>
</li>
